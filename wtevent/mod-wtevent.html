<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>WT Event – Panel</title>
  <link rel="stylesheet" href="style-wtevent.css">
</head>

<body>
  
<div class="panel">
  <h1>WT EVENT // oblicza ilość punktów potrzebnych na ulepszenie kuponu</h1>
 <div class="grid-row">
  <button class="col-6" id="toggleInputs" class="small-btn">Ustawienia</button>
  <button class="col-6" onclick="location.href='../index.html'">MENU</button>
</div>
  <div class="inputs-group" id="inputsGroup">
    <div class="row">
      <label>Data rozpoczęcia eventu</label>
      <div class="grid-row">
        <input class="col-6" type="date" id="event-date">
        <input class="col-6" type="time" id="event-time">
      </div>
    </div>

    <div class="row">
      <label>Liczba etapów (2 dni każdy)</label>
      <input type="number" id="stages" placeholder="np. 6">
    </div>

    <div class="row">
      <label>Punkty potrzebne na ulepszenie</label>
      <input type="number" id="upgrade-points" placeholder="np. 500000">
    </div>
  </div>

  <div class="result" id="output">Uzupełnij dane, aby zobaczyć wyniki.</div>
  <div class="big">Optymalnie teraz:<br><span id="required-now">0</span> pkt</div>
</div>

  <script src="script-wtevent.js"></script>
</body>
</html>
