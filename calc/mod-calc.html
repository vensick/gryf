<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>WT Event – Kalkulator</title>
  <link rel="stylesheet" href="style-calc.css">
</head>

<body>
  <div class="container">
    
   <div class="grid-row">
      <div class="col-4"><h1>Kalkulator</h1></div>
      <div class="col-4"></div>
      <button class=col-4 class="menu-button" onclick="location.href='../index.html'">MENU</button>
   </div>
    <label>Tryb RB:</label>
    <div class="type-buttons">
      <button id="btn-tank" data-mode="1.33">PNCR</button>
      <button id="btn-air" data-mode="1.40">LOTN</button>
      <button id="btn-naval" data-mode="2.20">MRSK</button>
    </div>


    <label>Punkty w meczu:</label>
    <input type="number" id="battle" value="0">

    <label>Mnożnik trybu:</label>
    <input type="number" id="mode" value="1" step="0.01">

    <label>Mnożnik ery:</label>
    <input type="number" id="era" value="1" step="0.1">

    <label>Punkty końcowe:</label>
    <input type="number" id="final" value="0">
  </div>

  <script src="script-calc.js"></script>
</body>
</html>
