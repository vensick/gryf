<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>WT Event – Kalkulator</title>
  <link rel="stylesheet" href="style-calc.css">
</head>

<body>
  <div class="container">
    
   <div class="grid-row">
      <div class="col-4"><h1>Kalkulator</h1></div>
      <div class="col-4"></div>
      <button class=col-4 class="menu-button" onclick="location.href='../index.html'">MENU</button>
   </div>
<br>
    <label>Podstawowe mnożniki RB:</label>
    <div class="type-buttons">
      <button id="btn-tank" data-mode="1.33">Pancerne</button>
      <button id="btn-air" data-mode="1.40">Lotnicze</button>
      <button id="btn-naval" data-mode="2.20">Morskie</button>
    </div>
<br>
   <div class="grid-row">
     <label class="col-6">Mnożnik trybu:</label>
     <label class="col-6">Mnożnik ery:</label>
   </div> 
   <div class="grid-row">    
     <input class="col-6" type="number" id="mode" value="1" step="0.1">
     <input class="col-6" type="number" id="era" value="1" step="0.1">
   </div>
    <label>Punkty w meczu:</label>
    <input type="number" id="battle" value="0">

    <label>Punkty końcowe:</label>
    <input type="number" id="final" value="0">
  </div>

  <script src="script-calc.js"></script>
</body>
</html>
